format = """
$time\
${custom.devcontainer}\
$hostname\
$username\
$line_break\
$directory\
$git_branch\
$git_status\
$hg_branch\
$line_break\
$shell\
$cmd_duration\
$nodejs\
$bun\
$deno\
$aws\
$line_break\
$character\
"""

palette = 'dracula'
add_newline = true

[palettes.dracula]
foreground = '#F8F8F2'
background = '#282A36'
current_line = '#44475A'
primary = '#1E1F29'
box = '#44475A'
blue = '#6272A4'
cyan = '#8BE9FD'
green = '#50FA7B'
orange = '#FFB86C'
pink = '#FF79C6'
purple = '#BD93F9'
red = '#FF5555'
yellow = '#F1FA8C'

[os]
#format = '[вФА](fg:current_line)[оВґ](fg:red)[$symbol ](fg:primary bg:red)[оВі](fg:red)'
disabled = false

[os.symbols]
Alpine = 'пМА'
Amazon = 'пЙ∞'
Android = 'оЬО'
Arch = 'пМГ'
CentOS = 'пМД'
Debian = 'пМЖ'
EndeavourOS = 'пМҐ'
Fedora = 'пМК'
FreeBSD = 'пММ'
Garuda = 'пЕЉ'
Gentoo = 'пМН'
Linux = 'пЕЉ'
Macos = 'пМВ'
Manjaro = 'пМТ'
Mariner = 'пЕЉ'
Mint = 'пМО'
NetBSD = 'пЕЉ'
NixOS = 'пМУ'
OpenBSD = 'пМ®'
OpenCloudOS = 'оЃ™'
openEuler = 'пЕЉ'
openSUSE = 'пМФ'
OracleLinux = 'вКВвКГ'
Pop = 'пМ™'
Raspbian = 'пМХ'
Redhat = 'пМЦ'
RedHatEnterprise = 'пМЦ'
Solus = 'пМ≠'
SUSE = 'пМФ'
Ubuntu = 'пМЫ'
Unknown = 'пДИ'
Windows = 'оЬП'

[directory]
#format = '[|](fg:current_line)[оВґ](fg:pink)[у∞ЈП ](fg:primary bg:pink)[оВі](fg:pink bg:box)[ $read_only$truncation_symbol$path](fg:foreground bg:box)[оВі](fg:box)'
#home_symbol = "о≠Ж ~"
#truncation_symbol = 'оѓЯ '
#truncation_length = 20
#read_only = 'у±Іµ '
#read_only_style = ''
truncate_to_repo = false
truncation_length = 20

[git_branch]
#format = '[вФА](fg:current_line)[оВґ](fg:green)[$symbol](fg:primary bg:green)[оВі](fg:green bg:box)[ $branch](fg:foreground bg:box)'
format = 'on [$symbol$branch(:$remote_branch)]($style) '

[hg_branch]
#format = '[вФА](fg:current_line)[оВґ](fg:green)[$symbol](fg:primary bg:green)[оВі](fg:green bg:box)[ $branch](fg:foreground bg:box)'
format = 'on [$symbol$branch(:$topic)]($style)$line_break' 

[git_status]
#format = '[( $all_status)](fg:foreground bg:box)[оВі](fg:box)'
format = '([\[$all_status$ahead_behind\]]($style) )$line_break'

[nodejs]
#format = '[вФА](fg:current_line)[оВґ](fg:green)[$symbol](fg:primary bg:green)[оВі](fg:green bg:box)[ $version](fg:foreground bg:box)[оВі](fg:box)'
detect_files = ["package.json", ".node-version", "!bunfig.toml", "!bun.lockb"]

[bun]
#format = '[вФА](fg:current_line)[оВґ](fg:green)[$symbol](fg:primary bg:green)[оВі](fg:green bg:box)[ $version](fg:foreground bg:box)[оВі](fg:box)'
symbol = 'рЯ•Я'

[deno]
#format = '[вФА](fg:current_line)[оВґ](fg:green)[$symbol](fg:primary bg:green)[оВі](fg:green bg:box)[ $version](fg:foreground bg:box)[оВі](fg:box)'
symbol = 'рЯ¶Х'

[aws]
#format = '[вФА](fg:current_line)[оВґ](fg:purple)[$symbol](fg:primary bg:purple)[оВі](fg:purple bg:box)[ $profile](fg:foreground bg:box)[оВі](fg:box)'
symbol = 'вШБпЄП'

[fill]
symbol = 'вФА'
style = 'fg:current_line'

[cmd_duration]
min_time = 500
#format = '[вФА](fg:current_line)[оВґ](fg:orange)[пГІ ](fg:primary bg:orange)[оВі](fg:orange bg:box)[ $duration ](fg:foreground bg:box)[оВі](fg:box)'
format = ' [пГІ ](fg:orange)[$duration](fg:orange)'

[shell]
#format = '[|](fg:current_line)[оВґ](fg:blue)[пТЙ ](fg:primary bg:blue)[оВі](fg:blue bg:box)[ $indicator](fg:foreground bg:box)[оВі](fg:box)'
format = 'о™Е [$indicator]($style)'
disabled = false

[time]
#format = '(fg:current_line)[оВґ](fg:purple)[у∞¶Ц ](fg:primary bg:purple)[оВі](fg:purple bg:box)[ $time](fg:foreground bg:box)[оВі](fg:box)'
format = '[у∞¶Ц ]($style)[$time]($style)'
time_format = '%b %d %r'
disabled = false

[username]
#format = '[вФА](fg:current_line)[оВґ](fg:yellow)[пРХ ](fg:primary bg:yellow)[оВі](fg:yellow bg:box)[ $user](fg:foreground bg:box)[оВі](fg:box) '
style_user = 'bold purple'
style_root = 'bold red'
format = ' [пРХ ]($style)[$user]($style)'
show_always = true

[hostname]
ssh_only = false
trim_at = ''
format = ' [у∞Нє ]($style)[$ssh_symbol$hostname]($style)'

[character]
#format = """
#[вФВ](fg:current_line)
#[вХ∞вФА$symbol](fg:current_line) """
success_symbol = '[оКЕоКЕ](fg:bold green)'
error_symbol = '[оКЕоКЕ](fg:bold red)'

[custom.devcontainer]
description = "Indicator for DevContainer environment"
when = 'env | grep -q "DEVCONTAINER=true"'
command = "echo 'via рЯРЛ '"
format = " [$output]($style)"
style = "bold pink"

